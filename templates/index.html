<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wordle Solver</title>
<style>
:root {
  --c-black: #3a3a3c;
  --c-yellow: #b59f3b;
  --c-green: #538d4e;
  --c-bg: #121213;
  --c-surface: #1a1a1b;
  --c-border: #3a3a3c;
  --c-text: #ffffff;
  --c-muted: #818384;
  --c-danger: #c0392b;
  --c-danger-bg: #3d0a0a;
  --radius: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--c-bg);
  color: var(--c-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  min-height: 100dvh;
}

/* ── Header ─────────────────────────────── */
header {
  text-align: center;
  padding: 1rem 1rem 0.75rem;
  border-bottom: 1px solid #2a2a2b;
}
header h1 {
  font-size: 1.4rem;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
header p {
  font-size: 0.78rem;
  color: var(--c-muted);
  margin-top: 0.2rem;
}

/* ── Main layout ─────────────────────────── */
main {
  max-width: 480px;
  margin: 0 auto;
  padding: 1rem;
}

/* ── Guess rows ──────────────────────────── */
#guess-rows { display: flex; flex-direction: column; gap: 0.75rem; }

.guess-row { display: flex; flex-direction: column; gap: 0.4rem; }

.row-tiles {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.tiles {
  display: flex;
  gap: 6px;
  flex: 1;
}

/* Tiles */
.tile {
  flex: 1;
  aspect-ratio: 1;
  max-width: 64px;
  background: var(--c-surface);
  border: 2px solid var(--c-border);
  border-radius: var(--radius);
  color: var(--c-text);
  font-size: 1.4rem;
  font-weight: 800;
  text-transform: uppercase;
  cursor: default;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background-color 0.12s ease, border-color 0.12s ease, transform 0.07s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  line-height: 1;
}
.tile[data-letter] { cursor: pointer; }
.tile[data-letter]:active { transform: scale(0.92); }

.tile[data-color="black"][data-letter] { background: var(--c-black); border-color: var(--c-black); }
.tile[data-color="yellow"]             { background: var(--c-yellow); border-color: var(--c-yellow); }
.tile[data-color="green"]              { background: var(--c-green);  border-color: var(--c-green);  }

/* Remove row button */
.btn-del-row {
  background: none;
  border: none;
  color: var(--c-muted);
  font-size: 1.3rem;
  line-height: 1;
  width: 2rem;
  height: 2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: var(--radius);
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
}
.btn-del-row:hover { color: #fff; }

/* Word text input */
.word-input {
  background: var(--c-surface);
  border: 1px solid var(--c-border);
  border-radius: var(--radius);
  color: var(--c-text);
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  padding: 0.45rem 0.75rem;
  text-transform: uppercase;
  width: calc(100% - 2.5rem); /* align with tiles (leave space for del btn) */
  -webkit-appearance: none;
}
.word-input::placeholder { color: #444; font-weight: 400; letter-spacing: 0.05em; }
.word-input:focus { outline: 2px solid #565758; border-color: transparent; }

/* ── Action buttons ──────────────────────── */
.actions {
  display: flex;
  gap: 0.5rem;
  margin-top: 1rem;
}

.btn {
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 700;
  padding: 0.65rem 1rem;
  transition: opacity 0.1s, transform 0.07s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.btn:active { opacity: 0.75; transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-primary  { background: var(--c-green);  color: #fff; flex: 2; }
.btn-outline  { background: var(--c-surface); color: var(--c-text); border: 1px solid var(--c-border); flex: 1; }
.btn-danger   { background: var(--c-danger);  color: #fff; }
.btn-sm { font-size: 0.78rem; padding: 0.45rem 0.7rem; }

/* ── Results ─────────────────────────────── */
#results { margin-top: 1.5rem; }

.results-bar {
  position: sticky;
  top: 0;
  z-index: 20;
  background: var(--c-bg);
  padding: 0.6rem 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
  border-bottom: 1px solid #2a2a2b;
  margin-bottom: 0.75rem;
}

#results-count {
  font-size: 1rem;
  font-weight: 700;
  flex-shrink: 0;
}

.results-controls {
  display: flex;
  gap: 0.4rem;
  align-items: center;
}

/* Word grid */
.word-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
  gap: 0.5rem;
}

.word-chip {
  background: var(--c-surface);
  border: 2px solid var(--c-border);
  border-radius: var(--radius);
  color: var(--c-text);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 0.5rem 0.2rem;
  text-align: center;
  text-transform: uppercase;
  transition: border-color 0.1s, background 0.1s, color 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.word-chip:hover { border-color: #666; }
.word-chip.selected {
  background: var(--c-danger-bg);
  border-color: var(--c-danger);
  color: #ff8080;
  text-decoration: line-through;
}

/* Status message */
#status {
  text-align: center;
  padding: 0.6rem;
  font-size: 0.85rem;
  color: var(--c-muted);
  display: none;
}

/* Responsive tweaks for very small screens */
@media (max-width: 360px) {
  .tile { font-size: 1.1rem; }
  .word-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
}
</style>
</head>
<body>

<header>
  <h1>Wordle Solver</h1>
  <p>Tap tiles to cycle: ⬛ &rarr; 🟨 &rarr; 🟩 &rarr; ⬛</p>
</header>

<main>
  <!-- Guess input area -->
  <div id="guess-rows"></div>

  <div class="actions">
    <button class="btn btn-outline" id="btn-add">＋ Add Guess</button>
    <button class="btn btn-primary" id="btn-filter">Filter Words</button>
    <button class="btn btn-outline" id="btn-clear">Clear</button>
  </div>

  <!-- Results area -->
  <div id="results" style="display:none">
    <div class="results-bar">
      <span id="results-count"></span>
      <div class="results-controls">
        <button class="btn btn-outline btn-sm" id="btn-select-all">Select All</button>
        <button class="btn btn-danger btn-sm" id="btn-remove" disabled>Remove (0)</button>
      </div>
    </div>
    <div id="word-grid" class="word-grid"></div>
    <div id="status"></div>
  </div>
</main>

<script>
'use strict';

const COLORS = ['black', 'yellow', 'green'];

// ── Row creation ──────────────────────────────────────────────────────────────

function createRow() {
  const row = document.createElement('div');
  row.className = 'guess-row';

  // Tiles row
  const rowTiles = document.createElement('div');
  rowTiles.className = 'row-tiles';

  const tilesDiv = document.createElement('div');
  tilesDiv.className = 'tiles';

  const tiles = Array.from({ length: 5 }, (_, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.dataset.color = 'black';
    tile.dataset.letter = '';
    tile.setAttribute('role', 'button');
    tile.setAttribute('aria-label', `Position ${i + 1}: empty`);
    tile.addEventListener('click', () => onTileClick(tile));
    return tile;
  });

  tiles.forEach(t => tilesDiv.appendChild(t));

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-del-row';
  delBtn.textContent = '×';
  delBtn.setAttribute('aria-label', 'Remove guess');
  delBtn.addEventListener('click', () => row.remove());

  rowTiles.appendChild(tilesDiv);
  rowTiles.appendChild(delBtn);

  // Word input
  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'word-input';
  input.maxLength = 5;
  input.placeholder = 'Type guess word…';
  input.autocomplete = 'off';
  input.autocorrect = 'off';
  input.spellcheck = false;

  input.addEventListener('input', () => syncInputToTiles(input, tiles));
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && input.value.length === 5) {
      const rows = document.querySelectorAll('.guess-row');
      const isLast = row === rows[rows.length - 1];
      if (isLast) {
        addRow();
      } else {
        // Focus next row's input
        const next = row.nextElementSibling;
        if (next) next.querySelector('.word-input')?.focus();
      }
    }
  });

  row.appendChild(rowTiles);
  row.appendChild(input);

  return { row, tiles, input };
}

function syncInputToTiles(input, tiles) {
  const word = input.value.replace(/[^a-zA-Z]/g, '').toUpperCase().slice(0, 5);
  input.value = word;

  tiles.forEach((tile, i) => {
    const prev = tile.dataset.letter;
    const next = word[i] || '';
    tile.dataset.letter = next;
    tile.textContent = next;
    tile.setAttribute('aria-label', next
      ? `Position ${i + 1}: ${next}, ${tile.dataset.color}`
      : `Position ${i + 1}: empty`);
    if (next !== prev) {
      tile.dataset.color = 'black'; // reset color on letter change
    }
  });
}

function onTileClick(tile) {
  if (!tile.dataset.letter) return;
  const idx = COLORS.indexOf(tile.dataset.color);
  tile.dataset.color = COLORS[(idx + 1) % COLORS.length];
  tile.setAttribute('aria-label',
    `Position ${[...tile.parentElement.children].indexOf(tile) + 1}: ${tile.dataset.letter}, ${tile.dataset.color}`);
}

function addRow() {
  const { row, input } = createRow();
  document.getElementById('guess-rows').appendChild(row);
  input.focus();
  return row;
}

// ── Controls ──────────────────────────────────────────────────────────────────

document.getElementById('btn-add').addEventListener('click', addRow);

document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('guess-rows').innerHTML = '';
  document.getElementById('results').style.display = 'none';
  addRow();
});

document.getElementById('btn-filter').addEventListener('click', doFilter);

// ── Filter ────────────────────────────────────────────────────────────────────

async function doFilter() {
  const guesses = collectGuesses();
  const btn = document.getElementById('btn-filter');
  btn.disabled = true;
  btn.textContent = 'Filtering…';

  try {
    const res = await fetch('/api/filter', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guesses }),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();
    showResults(data.words, data.count);
  } catch (err) {
    alert('Filter failed: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Filter Words';
  }
}

function collectGuesses() {
  return [...document.querySelectorAll('.guess-row')].flatMap(row => {
    const tiles = [...row.querySelectorAll('.tile')];
    const letters = tiles.map(t => t.dataset.letter);
    const colors  = tiles.map(t => t.dataset.color);
    if (!letters.some(Boolean)) return [];
    return [{ letters, colors }];
  });
}

// ── Results ───────────────────────────────────────────────────────────────────

function showResults(words, count) {
  const resultsEl = document.getElementById('results');
  const grid      = document.getElementById('word-grid');
  const countEl   = document.getElementById('results-count');
  const statusEl  = document.getElementById('status');

  resultsEl.style.display = 'block';
  countEl.textContent = `${count.toLocaleString()} word${count !== 1 ? 's' : ''} found`;
  statusEl.style.display = 'none';

  grid.innerHTML = '';
  words.forEach(word => {
    const chip = document.createElement('button');
    chip.className = 'word-chip';
    chip.textContent = word;
    chip.type = 'button';
    chip.addEventListener('click', () => {
      chip.classList.toggle('selected');
      updateRemoveBtn();
    });
    grid.appendChild(chip);
  });

  updateRemoveBtn();
  resultsEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── Select All ────────────────────────────────────────────────────────────────

document.getElementById('btn-select-all').addEventListener('click', () => {
  const chips = [...document.querySelectorAll('.word-chip')];
  const allSelected = chips.every(c => c.classList.contains('selected'));
  chips.forEach(c => c.classList.toggle('selected', !allSelected));
  document.getElementById('btn-select-all').textContent =
    allSelected ? 'Select All' : 'Deselect All';
  updateRemoveBtn();
});

function updateRemoveBtn() {
  const n = document.querySelectorAll('.word-chip.selected').length;
  const btn = document.getElementById('btn-remove');
  btn.textContent = `Remove (${n})`;
  btn.disabled = n === 0;

  // Update Select All label
  const total = document.querySelectorAll('.word-chip').length;
  document.getElementById('btn-select-all').textContent =
    (n === total && total > 0) ? 'Deselect All' : 'Select All';
}

// ── Remove ────────────────────────────────────────────────────────────────────

document.getElementById('btn-remove').addEventListener('click', async () => {
  const selected = [...document.querySelectorAll('.word-chip.selected')];
  if (!selected.length) return;

  const words = selected.map(c => c.textContent);
  if (!confirm(`Permanently remove ${words.length} word(s) from words.txt?`)) return;

  const btn = document.getElementById('btn-remove');
  btn.disabled = true;
  btn.textContent = 'Removing…';

  try {
    const res = await fetch('/api/remove', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ words }),
    });
    if (!res.ok) throw new Error(`Server error ${res.status}`);
    const data = await res.json();

    selected.forEach(c => c.remove());
    const remaining = document.querySelectorAll('.word-chip').length;
    document.getElementById('results-count').textContent =
      `${remaining.toLocaleString()} word${remaining !== 1 ? 's' : ''} found  ·  ${data.removed} removed`;

    const statusEl = document.getElementById('status');
    statusEl.textContent = `${data.removed} word(s) removed · ${data.remaining.toLocaleString()} remaining in words.txt`;
    statusEl.style.display = 'block';

    updateRemoveBtn();
  } catch (err) {
    alert('Remove failed: ' + err.message);
    updateRemoveBtn();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
addRow();
</script>
</body>
</html>
